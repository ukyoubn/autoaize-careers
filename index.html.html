<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AutoAIze — Careers Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@500;700&family=Noto+Serif+JP:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:    #fafaf7;
    --ink:      #1a1a1a;
    --ink-soft: #4a4a4a;
    --muted:    #8a8580;
    --line:     rgba(26, 26, 26, 0.12);
    --accent:   #c2402f;
    --gold:     #c9a96a;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    color: var(--ink);
    background: var(--paper);
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    line-height: 1.85;
    -webkit-font-smoothing: antialiased;
  }
  body { overflow-x: hidden; }

  .wrap {
    max-width: 880px;
    margin: 0 auto;
    padding: 0 32px;
  }

  nav.top {
    padding: 28px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--ink-soft);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--line);
  }
  nav.top .brand { font-weight: 400; color: var(--ink); }
  nav.top .meta  { color: var(--muted); letter-spacing: 0.18em; font-size: 11px; }

  .hero {
    padding: 12vh 0 8vh;
  }
  .hero-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .hero-title {
    font-family: 'Kaisei Decol', serif;
    font-weight: 500;
    font-size: clamp(28px, 4.2vw, 48px);
    line-height: 1.4;
    margin: 0 0 20px;
    color: var(--ink);
    letter-spacing: 0.01em;
  }
  .hero-sub {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin: 0 0 40px;
  }
  .submit-btn {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--paper);
    background: var(--ink);
    border: none;
    padding: 14px 32px;
    text-decoration: none;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .submit-btn:hover { opacity: 0.75; }

  .divider {
    border: none;
    border-top: 1px solid var(--line);
    margin: 0;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 48px 0 32px;
  }

  .count-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 4px 12px;
    margin-left: 16px;
    vertical-align: middle;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1px;
    border-top: 1px solid var(--line);
    border-left: 1px solid var(--line);
    margin-bottom: 80px;
  }

  .card {
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 28px 24px;
    background: var(--paper);
    transition: background 0.2s;
  }
  .card:hover { background: #f2f2ee; }

  .card-name {
    font-family: 'Noto Serif JP', serif;
    font-weight: 500;
    font-size: 15px;
    color: var(--ink);
    margin: 0 0 8px;
    letter-spacing: 0.04em;
  }
  .card-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--muted);
    margin: 0 0 20px;
    text-transform: uppercase;
  }
  .card-link {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid rgba(194, 64, 47, 0.3);
    padding-bottom: 2px;
    transition: border-color 0.2s;
    word-break: break-all;
  }
  .card-link:hover { border-color: var(--accent); }

  .loading {
    padding: 60px 0;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-align: center;
  }

  .empty {
    padding: 60px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.16em;
    color: var(--muted);
    text-align: center;
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }

  footer {
    border-top: 1px solid var(--line);
    padding: 32px 0;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>

<nav class="top">
  <span class="brand">AutoAIze</span>
  <span class="meta">Careers · Gallery</span>
</nav>

<div class="wrap">
  <div class="hero">
    <p class="hero-label">— Careers Gallery</p>
    <h1 class="hero-title">みんなの採用ページ</h1>
    <p class="hero-sub">それぞれの光が、ここに集まる。</p>
    <a href="submit.html" class="submit-btn">あなたの作品を提出する →</a>
  </div>
</div>

<hr class="divider">

<div class="wrap">
  <p class="section-label">
    提出作品
    <span class="count-badge" id="count">— 件</span>
  </p>

  <div id="loading" class="loading">loading...</div>
  <div class="grid" id="grid" style="display:none;"></div>
</div>

<footer>AutoAIze Inc. — Careers Gallery</footer>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSIyDkRloV7_tsgoFdCwDNMZbAllMVVlpyChKvKTEAa3znWSr1Dtvvcc4H_N9LiA_nrcgKnHG6qj3Vo/pub?gid=0&single=true&output=csv';

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    const cols = line.match(/(".*?"|[^,]+)(?=,|$)/g) || [];
    const obj = {};
    headers.forEach((h, i) => {
      obj[h] = (cols[i] || '').trim().replace(/^"|"$/g, '');
    });
    return obj;
  }).filter(row => row.name && row.url);
}

async function load() {
  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    const text = await res.text();
    const rows = parseCSV(text);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('grid').style.display = 'grid';
    document.getElementById('count').textContent = rows.length + ' 件';

    const grid = document.getElementById('grid');

    if (rows.length === 0) {
      grid.innerHTML = '<div class="empty">まだ提出作品がありません。最初の一人になりませんか？</div>';
      return;
    }

    rows.reverse().forEach(row => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <p class="card-name">${escHtml(row.name)}</p>
        <p class="card-date">${escHtml(row.date || '')}</p>
        <a class="card-link" href="${escHtml(row.url)}" target="_blank" rel="noopener">${escHtml(row.url)}</a>
      `;
      grid.appendChild(card);
    });
  } catch (e) {
    document.getElementById('loading').textContent = 'データの読み込みに失敗しました。';
    console.error(e);
  }
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load();
</script>
</body>
</html>
