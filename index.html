<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AutoAIze — Careers Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #ffffff;
    --gray-100: #f7f7f5;
    --gray-200: #e8e8e4;
    --gray-400: #999990;
    --gray-600: #555550;
    --accent: #0057ff;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { color: var(--black); background: var(--white); font-family: 'Noto Serif JP', serif; font-weight: 300; line-height: 1.7; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 0 48px; height: 64px; background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-bottom: 0.5px solid var(--gray-200); }
  .nav-brand { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; letter-spacing: 0.12em; color: var(--black); text-decoration: none; text-transform: uppercase; font-weight: 400; }
  .nav-right { display: flex; align-items: center; gap: 32px; }
  .nav-link { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.18em; color: var(--gray-600); text-decoration: none; text-transform: uppercase; transition: color 0.2s; }
  .nav-link:hover { color: var(--black); }
  .nav-cta { border: 0.5px solid var(--black); color: var(--black); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.18em; padding: 8px 24px; text-decoration: none; text-transform: uppercase; transition: all 0.2s; }
  .nav-cta:hover { background: var(--black); color: var(--white); }
  .hero { padding: 140px 48px 64px; max-width: 1100px; margin: 0 auto; }
  .hero-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--gray-400); margin-bottom: 24px; }
  .hero-title { font-size: clamp(40px, 5.5vw, 72px); font-weight: 400; line-height: 1.1; color: var(--black); margin-bottom: 20px; letter-spacing: -0.02em; font-style: italic; }
  .hero-sub { font-size: 15px; font-weight: 300; color: var(--gray-600); line-height: 1.9; max-width: 400px; }
  .divider { height: 0.5px; background: var(--gray-200); margin: 0 48px; }
  .gallery-header { max-width: 1100px; margin: 0 auto; padding: 28px 48px; display: flex; justify-content: space-between; align-items: center; }
  .gallery-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gray-400); }
  .gallery { max-width: 1100px; margin: 0 auto; padding: 0 48px 120px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 56px 32px; }
  .card { cursor: pointer; }
  .card:nth-child(3n+2) { margin-top: 48px; }
  .card-thumb { width: 100%; aspect-ratio: 3/4; background: var(--gray-100); margin-bottom: 20px; overflow: hidden; position: relative; }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; display: block; }
  .card:hover .card-thumb img { transform: scale(1.04); }
  .card-meta { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.16em; color: var(--gray-400); text-transform: uppercase; margin-bottom: 8px; }
  .card-title { font-size: 16px; font-weight: 400; color: var(--black); margin-bottom: 6px; font-style: italic; line-height: 1.4; }
  .card-desc { font-size: 12px; font-weight: 300; color: var(--gray-600); line-height: 1.8; margin-bottom: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-link { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: var(--gray-400); text-decoration: none; text-transform: uppercase; border-bottom: 0.5px solid var(--gray-200); padding-bottom: 2px; transition: all 0.2s; }
  .card-link:hover { color: var(--black); border-color: var(--black); }
  .state-box { grid-column: 1/-1; padding: 80px 0; text-align: center; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.18em; color: var(--gray-400); text-transform: uppercase; }
  footer { border-top: 0.5px solid var(--gray-200); padding: 32px 48px; display: flex; justify-content: space-between; align-items: center; }
  .footer-brand { font-family: 'Noto Sans JP', sans-serif; font-size: 13px; letter-spacing: 0.12em; color: var(--black); text-transform: uppercase; }
  .footer-copy { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.14em; color: var(--gray-400); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .hero-label { animation: fadeUp 0.5s ease both; }
  .hero-title { animation: fadeUp 0.5s 0.1s ease both; }
  .hero-sub { animation: fadeUp 0.5s 0.2s ease both; }
  .card { animation: fadeUp 0.5s ease both; }
  @media (max-width: 768px) {
    nav { padding: 0 24px; }
    .hero { padding: 100px 24px 48px; }
    .divider { margin: 0 24px; }
    .gallery-header { padding: 24px; }
    .gallery { padding: 0 24px 80px; grid-template-columns: 1fr; gap: 40px; }
    .card:nth-child(3n+2) { margin-top: 0; }
    footer { padding: 24px; flex-direction: column; gap: 12px; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">AutoAIze</a>
  <div class="nav-right">
    <a href="guide.html" class="nav-link">はじめての人へ</a>
    <a href="https://autoaize.co.jp" class="nav-link" target="_blank">Company</a>
    <a href="submit.html" class="nav-cta">作品を提出する</a>
  </div>
</nav>

<div class="hero">
  <p class="hero-label">Careers Gallery — 2026</p>
  <h1 class="hero-title">みんなの採用ページ。</h1>
  <p class="hero-sub">それぞれの光が、ここに集まる。あなたの作品も、加えてください。</p>
</div>

<div class="divider"></div>

<div class="gallery-header">
  <span class="gallery-label">展示作品</span>
  <span class="gallery-label" id="count-label">読み込み中...</span>
</div>

<div class="gallery" id="grid">
  <div class="state-box">Loading...</div>
</div>

<div class="divider"></div>

<footer>
  <span class="footer-brand">AutoAIze</span>
  <span class="footer-copy">Careers Gallery © 2026</span>
</footer>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSIyDkRloV7_tsgoFdCwDNMZbAllMVVlpyChKvKTEAa3znWSr1Dtvvcc4H_N9LiA_nrcgKnHG6qj3Vo/pub?gid=0&single=true&output=csv';

const PALETTES = [
  { bg: '#0a0a0a', text: '#ffffff', sub: 'rgba(255,255,255,0.35)' },
  { bg: '#1a1a2e', text: '#ffffff', sub: 'rgba(255,255,255,0.35)' },
  { bg: '#f5f0e8', text: '#1a1a1a', sub: 'rgba(0,0,0,0.3)' },
  { bg: '#0a2a1a', text: '#ffffff', sub: 'rgba(255,255,255,0.35)' },
  { bg: '#2a1a0a', text: '#ffffff', sub: 'rgba(255,255,255,0.35)' },
  { bg: '#f0f0f5', text: '#1a1a1a', sub: 'rgba(0,0,0,0.3)' },
  { bg: '#1a0a2a', text: '#ffffff', sub: 'rgba(255,255,255,0.35)' },
  { bg: '#0a1a2a', text: '#ffffff', sub: 'rgba(255,255,255,0.35)' },
];

function escSVG(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function splitText(text, maxLen) {
  if (!text) return [''];
  const result = [];
  let current = '';
  for (const char of text) {
    current += char;
    if (current.length >= maxLen || char === '。' || char === '、') {
      result.push(current);
      current = '';
    }
  }
  if (current) result.push(current);
  return result.slice(0, 3);
}

function generateThumb(title, name, index) {
  const p = PALETTES[index % PALETTES.length];
  const lines = splitText(title, 10);
  const lh = 54;
  const sy = 200 - (lines.length * lh) / 2;
  const textLines = lines.map((line, i) =>
    `<text x="160" y="${sy + i * lh}" font-family="Georgia,serif" font-size="28" font-style="italic" fill="${p.text}" text-anchor="middle" dominant-baseline="middle">${escSVG(line)}</text>`
  ).join('');
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="320" height="427" viewBox="0 0 320 427">
    <rect width="320" height="427" fill="${p.bg}"/>
    <text x="160" y="52" font-family="monospace" font-size="9" letter-spacing="3" fill="${p.sub}" text-anchor="middle">AUTOAIZE 2026</text>
    ${textLines}
    <line x1="130" y1="${sy + lines.length * lh + 18}" x2="190" y2="${sy + lines.length * lh + 18}" stroke="${p.sub}" stroke-width="0.5"/>
    <text x="160" y="392" font-family="monospace" font-size="9" letter-spacing="2" fill="${p.sub}" text-anchor="middle">by ${escSVG(name)}</text>
  </svg>`;
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    const cols = line.match(/(".*?"|[^,]+)(?=,|$)/g) || [];
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (cols[i] || '').trim().replace(/^"|"$/g, ''); });
    return obj;
  }).filter(row => row.name && row.url);
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function load() {
  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    const text = await res.text();
    const rows = parseCSV(text);
    const grid = document.getElementById('grid');

    document.getElementById('count-label').textContent = rows.length + ' works';

    if (rows.length === 0) {
      grid.innerHTML = '<div class="state-box">まだ提出作品がありません。最初の一人になりませんか？</div>';
      return;
    }

    grid.innerHTML = '';
    rows.reverse().forEach((row, i) => {
      const displayTitle = row.title || row.name + 'さんの採用ページ';
      const thumb = generateThumb(displayTitle, row.name, i);
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = (i * 0.06) + 's';
      card.innerHTML = `
        <div class="card-thumb">
          <img src="${thumb}" alt="${esc(displayTitle)}" />
        </div>
        <p class="card-meta">No. ${String(rows.length - i).padStart(3, '0')} — ${esc(row.name)}</p>
        <p class="card-title">${esc(displayTitle)}</p>
        ${row.description ? `<p class="card-desc">${esc(row.description)}</p>` : ''}
        <a class="card-link" href="${esc(row.url)}" target="_blank" rel="noopener">作品を見る ↗</a>
      `;
      grid.appendChild(card);
    });

  } catch (e) {
    document.getElementById('grid').innerHTML = '<div class="state-box">データの読み込みに失敗しました。</div>';
  }
}

load();
</script>
</body>
</html>
