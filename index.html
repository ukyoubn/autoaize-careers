<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AutoAIze — Careers Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #ffffff;
    --gray-100: #f5f5f5;
    --gray-200: #e8e8e8;
    --gray-400: #999999;
    --gray-600: #555555;
    --accent: #0057ff;
    --accent-light: #e8eeff;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { color: var(--black); background: var(--white); font-family: 'Noto Sans JP', sans-serif; font-weight: 400; line-height: 1.7; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 0 48px; height: 64px; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--gray-200); }
  .nav-brand { font-size: 17px; font-weight: 700; color: var(--black); text-decoration: none; letter-spacing: -0.02em; }
  .nav-right { display: flex; align-items: center; gap: 32px; }
  .nav-link { font-size: 13px; font-weight: 500; color: var(--gray-600); text-decoration: none; transition: color 0.2s; }
  .nav-link:hover { color: var(--black); }
  .nav-cta { background: var(--black); color: var(--white); font-size: 13px; font-weight: 500; padding: 10px 24px; text-decoration: none; letter-spacing: 0.04em; transition: background 0.2s; }
  .nav-cta:hover { background: var(--accent); }

  .hero { padding: 160px 48px 80px; max-width: 1200px; margin: 0 auto; }
  .hero-tag { display: inline-block; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); background: var(--accent-light); padding: 6px 14px; margin-bottom: 32px; }
  .hero-title { font-size: clamp(40px, 6vw, 80px); font-weight: 900; line-height: 1.1; letter-spacing: -0.03em; color: var(--black); margin-bottom: 24px; }
  .hero-title span { color: var(--accent); }
  .hero-sub { font-size: 17px; font-weight: 300; color: var(--gray-600); max-width: 480px; line-height: 1.8; margin-bottom: 48px; }
  .hero-btn { display: inline-flex; align-items: center; gap: 12px; background: var(--black); color: var(--white); font-size: 14px; font-weight: 500; padding: 16px 36px; text-decoration: none; letter-spacing: 0.04em; transition: all 0.2s; }
  .hero-btn:hover { background: var(--accent); gap: 18px; }

  .stats-bar { background: var(--black); padding: 28px 48px; }
  .stats-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 64px; }
  .stat-item { display: flex; align-items: baseline; gap: 8px; }
  .stat-num { font-size: 28px; font-weight: 900; color: var(--white); letter-spacing: -0.02em; }
  .stat-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.16em; color: var(--gray-400); text-transform: uppercase; }
  .stat-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.1); }

  .gallery-section { max-width: 1200px; margin: 0 auto; padding: 80px 48px; }
  .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 48px; padding-bottom: 24px; border-bottom: 2px solid var(--black); }
  .section-title { font-size: 13px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
  .section-count { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--gray-400); letter-spacing: 0.1em; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 2px; background: var(--gray-200); }

  .card { background: var(--white); transition: background 0.15s; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 0; background: var(--accent); transition: height 0.3s ease; z-index: 1; }
  .card:hover { background: var(--gray-100); }
  .card:hover::before { height: 100%; }

  .card-preview { width: 100%; aspect-ratio: 16/9; overflow: hidden; background: var(--gray-100); position: relative; border-bottom: 1px solid var(--gray-200); }
  .card-preview img { width: 100%; height: 100%; object-fit: cover; object-position: top; transition: transform 0.4s ease; display: block; }
  .card:hover .card-preview img { transform: scale(1.03); }
  .card-preview-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--gray-100); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.14em; color: var(--gray-400); text-transform: uppercase; }

  .card-body { padding: 24px 28px; }
  .card-index { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.16em; color: var(--gray-400); margin-bottom: 10px; }
  .card-title { font-size: 17px; font-weight: 700; color: var(--black); letter-spacing: -0.01em; margin-bottom: 6px; line-height: 1.4; }
  .card-name { font-size: 12px; font-weight: 500; color: var(--gray-600); margin-bottom: 10px; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; }
  .card-desc { font-size: 13px; font-weight: 300; color: var(--gray-600); line-height: 1.7; margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 16px; border-top: 1px solid var(--gray-200); }
  .card-date { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; color: var(--gray-400); text-transform: uppercase; }
  .card-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--accent); text-decoration: none; transition: gap 0.2s; }
  .card-link:hover { gap: 10px; }

  .state-box { grid-column: 1 / -1; background: var(--white); padding: 80px 48px; text-align: center; }
  .state-box p { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.18em; color: var(--gray-400); text-transform: uppercase; }

  footer { background: var(--black); padding: 48px; display: flex; justify-content: space-between; align-items: center; }
  .footer-brand { font-size: 15px; font-weight: 700; color: var(--white); }
  .footer-copy { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.14em; color: var(--gray-400); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .hero-tag  { animation: fadeUp 0.5s ease both; }
  .hero-title{ animation: fadeUp 0.5s 0.1s ease both; }
  .hero-sub  { animation: fadeUp 0.5s 0.2s ease both; }
  .hero-btn  { animation: fadeUp 0.5s 0.3s ease both; }
  .card { animation: fadeUp 0.4s ease both; }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">AutoAIze</a>
  <div class="nav-right">
    <a href="guide.html" class="nav-link">はじめての人へ</a>
    <a href="https://autoaize.co.jp" class="nav-link" target="_blank">Company</a>
    <a href="submit.html" class="nav-cta">作品を提出する</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-tag">Careers Gallery</div>
  <h1 class="hero-title">みんなの<br><span>採用ページ</span>。</h1>
  <p class="hero-sub">それぞれの個性が、ここに集まる。あなたの作品も、加えてください。</p>
  <a href="submit.html" class="hero-btn">作品を提出する <span>→</span></a>
</div>

<div class="stats-bar">
  <div class="stats-inner">
    <div class="stat-item"><span class="stat-num" id="stat-count">—</span><span class="stat-label">作品</span></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><span class="stat-num">2026</span><span class="stat-label">年度</span></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><span class="stat-num">∞</span><span class="stat-label">可能性</span></div>
  </div>
</div>

<div class="gallery-section">
  <div class="section-header">
    <span class="section-title">提出作品</span>
    <span class="section-count" id="count-label">読み込み中...</span>
  </div>
  <div class="grid" id="grid">
    <div class="state-box"><p>Loading...</p></div>
  </div>
</div>

<footer>
  <span class="footer-brand">AutoAIze</span>
  <span class="footer-copy">Careers Gallery © 2026</span>
</footer>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSIyDkRloV7_tsgoFdCwDNMZbAllMVVlpyChKvKTEAa3znWSr1Dtvvcc4H_N9LiA_nrcgKnHG6qj3Vo/pub?gid=0&single=true&output=csv';

function screenshotUrl(pageUrl) {
  return `https://image.thum.io/get/width/640/crop/360/noanimate/${pageUrl}`;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    const cols = line.match(/(".*?"|[^,]+)(?=,|$)/g) || [];
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (cols[i] || '').trim().replace(/^"|"$/g, ''); });
    return obj;
  }).filter(row => row.name && row.url);
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function load() {
  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    const text = await res.text();
    const rows = parseCSV(text);
    const grid = document.getElementById('grid');

    document.getElementById('stat-count').textContent = rows.length;
    document.getElementById('count-label').textContent = rows.length + ' 件';

    if (rows.length === 0) {
      grid.innerHTML = '<div class="state-box"><p>まだ提出作品がありません。最初の一人になりませんか？</p></div>';
      return;
    }

    grid.innerHTML = '';
    rows.reverse().forEach((row, i) => {
      const thumb = screenshotUrl(row.url);
      const displayTitle = row.title || row.name + 'さんの採用ページ';
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = (i * 0.05) + 's';
      card.innerHTML = `
        <div class="card-preview">
          <img data-src="${esc(thumb)}" alt="${esc(displayTitle)}"
            onerror="this.parentElement.innerHTML='<div class=\\'card-preview-placeholder\\'>No Preview</div>'" />
        </div>
        <div class="card-body">
          <p class="card-index">No. ${String(rows.length - i).padStart(3, '0')}</p>
          <p class="card-title">${esc(displayTitle)}</p>
          <p class="card-name">by ${esc(row.name)}</p>
          ${row.description ? `<p class="card-desc">${esc(row.description)}</p>` : ''}
          <div class="card-footer">
            <span class="card-date">${esc(row.date || '')}</span>
            <a class="card-link" href="${esc(row.url)}" target="_blank" rel="noopener">ページを見る ↗</a>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });

    // 画面内に入ったときだけ画像を読み込む
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const img = entry.target;
          img.src = img.dataset.src;
          observer.unobserve(img);
        }
      });
    }, { rootMargin: '200px' });

    document.querySelectorAll('img[data-src]').forEach(img => observer.observe(img));
  } catch (e) {
    document.getElementById('grid').innerHTML = '<div class="state-box"><p>データの読み込みに失敗しました。</p></div>';
  }
}

load();
</script>
</body>
</html>
