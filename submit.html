<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AutoAIze — 作品を提出する</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@500;700&family=Noto+Serif+JP:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:    #fafaf7;
    --ink:      #1a1a1a;
    --ink-soft: #4a4a4a;
    --muted:    #8a8580;
    --line:     rgba(26, 26, 26, 0.12);
    --accent:   #c2402f;
    --gold:     #c9a96a;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    color: var(--ink);
    background: var(--paper);
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    line-height: 1.85;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 32px;
  }

  nav.top {
    padding: 28px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--ink-soft);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--line);
  }
  nav.top .brand { font-weight: 400; color: var(--ink); }
  nav.top .meta  { color: var(--muted); letter-spacing: 0.18em; font-size: 11px; }

  .hero {
    padding: 10vh 0 6vh;
  }
  .hero-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .hero-title {
    font-family: 'Kaisei Decol', serif;
    font-weight: 500;
    font-size: clamp(24px, 3.5vw, 40px);
    line-height: 1.4;
    margin: 0 0 16px;
    color: var(--ink);
  }
  .hero-sub {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.14em;
    color: var(--muted);
    margin: 0 0 48px;
  }

  .form-group {
    margin-bottom: 40px;
  }
  .form-label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .form-input {
    display: block;
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line);
    padding: 12px 0;
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    font-weight: 300;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    border-radius: 0;
  }
  .form-input:focus {
    border-bottom-color: var(--ink);
  }
  .form-input::placeholder {
    color: var(--muted);
    font-size: 14px;
  }

  .submit-btn {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--paper);
    background: var(--ink);
    border: none;
    padding: 16px 40px;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 16px;
  }
  .submit-btn:hover { opacity: 0.75; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .message {
    margin-top: 32px;
    padding: 20px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.14em;
    display: none;
  }
  .message.success {
    border-left: 2px solid var(--gold);
    color: var(--ink-soft);
  }
  .message.error {
    border-left: 2px solid var(--accent);
    color: var(--accent);
  }

  .back-link {
    display: inline-block;
    margin-top: 40px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px solid var(--line);
    padding-bottom: 2px;
  }
  .back-link:hover { color: var(--ink); border-color: var(--ink); }

  footer {
    margin-top: 80px;
    border-top: 1px solid var(--line);
    padding: 32px 0;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>

<nav class="top">
  <span class="brand">AutoAIze</span>
  <span class="meta">Careers · Submit</span>
</nav>

<div class="wrap">
  <div class="hero">
    <p class="hero-label">— Submit Your Work</p>
    <h1 class="hero-title">あなたの作品を<br>ここに残す。</h1>
    <p class="hero-sub">名前とURLを入力するだけ。</p>
  </div>

  <div class="form-group">
    <label class="form-label" for="name">あなたの名前</label>
    <input class="form-input" type="text" id="name" placeholder="山田 太郎" />
  </div>

  <div class="form-group">
    <label class="form-label" for="url">採用ページのURL</label>
    <input class="form-input" type="url" id="url" placeholder="https://your-page.vercel.app" />
  </div>

  <button class="submit-btn" id="btn" onclick="submitForm()">提出する →</button>

  <div class="message success" id="success">
    ✓ &nbsp;提出が完了しました。ギャラリーに追加されます。
    <br><br>
    <a href="index.html" style="color: var(--ink); letter-spacing: 0.1em;">← ギャラリーを見る</a>
  </div>
  <div class="message error" id="error">
    提出に失敗しました。もう一度お試しください。
  </div>

  <br>
  <a href="index.html" class="back-link">← ギャラリーに戻る</a>
</div>

<footer>AutoAIze Inc. — Careers Gallery</footer>

<script>
const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';

async function submitForm() {
  const name = document.getElementById('name').value.trim();
  const url  = document.getElementById('url').value.trim();

  if (!name || !url) {
    alert('名前とURLを入力してください。');
    return;
  }
  if (!url.startsWith('http')) {
    alert('URLは http:// または https:// から始めてください。');
    return;
  }

  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, url, date: new Date().toLocaleDateString('ja-JP') })
    });

    document.getElementById('success').style.display = 'block';
    document.getElementById('name').value = '';
    document.getElementById('url').value = '';
    btn.style.display = 'none';
  } catch (e) {
    document.getElementById('error').style.display = 'block';
    btn.disabled = false;
    btn.textContent = '提出する →';
  }
}
</script>
</body>
</html>
